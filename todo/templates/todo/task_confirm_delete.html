<!-- todo/templates/todo/task_confirm_delete.html -->
{% extends 'todo/base.html' %}

{% block title %}Delete task{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm border-danger">
            <div class="card-header bg-danger text-white">
                <h4 class="mb-0">🗑️ Delete task</h4>
            </div>
            <div class="card-body text-center">
                <p class="fs-5">Are you sure you want to delete this task?</p>
                <p class="fw-bold fs-4">"{{ object.title }}"</p>
                <p class="text-muted">This action cannot be undone.</p>
                
                <form method="POST">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger me-2">Yes, delete</button>
                    <a href="{% url 'todo:task_list' %}" class="btn btn-outline-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
